[build-system]
requires = ["poetry >= 2.0.0, < 3.0.0"]
build-backend = "poetry.core.masonry.api"

[project]
name = "license-mole"
version = "0.2.2"
requires-python = ">= 3.12"
repository = "https://github.com/posit-dev/license-mole"
readme = "README.md"
documentation = "https://github.com/posit-dev/license-mole/docs"
description = "Multi-language Open-source License Excavator"
dependencies = ["requests (>=2.32.5,<3.0.0)"]

[project.scripts]
mole = "license_mole.__main__:main"

[tool.poetry]
classifiers = [
  "Development Status :: 4 - Beta",
  "Topic :: Software Development :: Documentation",
]

[tool.poetry.group]
dev.optional = true
docs.optional = true

[tool.poetry.group.dev.dependencies]
flake8 = "^7.3.0"
ruff = "^0.12.9"
mypy = "^1.17.1"
python-semantic-release = "^10.3.1"
commitlint = "^1.3.0"
flake8-docstrings = "^1.7.0"
flake8-import-order = "^0.19.2"
flake8-rst-docstrings = "^0.3.1"
pep8-naming = "^0.15.1"
pydoclint = "^0.6.10"
types-requests = "^2.32.4.20250809"

[tool.poetry.group.docs.dependencies]
sphinx = "^8.2.3"
sphinx-markdown-builder = "^0.6.8"

[tool.semantic_release]
build_command = "make dist"
build_command_env = []
commit_message = "chore: bump to version {version}\n\nAutomatically generated by python-semantic-release"
commit_parser = "conventional"
logging_use_named_masks = false
major_on_zero = false
allow_zero_version = true
no_git_verify = false
tag_format = "v{version}"
version_toml = ["pyproject.toml:project.version"]
version_variables = ["src/license_mole/__init__.py:__version__"]

[tool.semantic_release.branches.main]
match = "(main|master)"
prerelease_token = "rc"
prerelease = false

[tool.semantic_release.changelog]
exclude_commit_patterns = []
mode = "init"
insertion_flag = "<!-- version list -->"
template_dir = "templates"

[tool.semantic_release.changelog.default_templates]
changelog_file = "CHANGELOG.md"
output_format = "md"
mask_initial_release = false

[tool.semantic_release.changelog.environment]
block_start_string = "{%"
block_end_string = "%}"
variable_start_string = "{{"
variable_end_string = "}}"
comment_start_string = "{#"
comment_end_string = "#}"
trim_blocks = false
lstrip_blocks = false
newline_sequence = "\n"
keep_trailing_newline = false
extensions = []
autoescape = false

[tool.semantic_release.commit_author]
env = "GIT_COMMIT_AUTHOR"
default = "semantic-release <semantic-release>"

[tool.semantic_release.commit_parser_options]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]
other_allowed_tags = ["build", "chore", "ci", "docs", "style", "refactor", "test"]
allowed_tags = ["feat", "fix", "perf", "build", "chore", "ci", "docs", "style", "refactor", "test"]
default_bump_level = 0
parse_squash_commits = true
ignore_merge_commits = false

[tool.semantic_release.remote]
name = "origin"
type = "github"
ignore_token_for_push = false
insecure = false

[tool.semantic_release.publish]
dist_glob_patterns = ["dist/*"]
upload_to_vcs_release = true
